spring:
  application.name: spring-ai-lab

  ai.ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    chat:
      model: ${OLLAMA_MODEL:llama3.1}
      options.max-tokens: 500 # Limits cost by capping response length

  reactor.context-propagation: auto

# Appended to the system prompt by PersonaAdvisor (see ChatClientConfig.defaultAdvisors).
app.chat:
  memory-retrieve-size: 100
  creative-temperature: 0.9
  strict-temperature: 0.1
  persona: "Be concise and friendly."

logging:
  level:
    com.example.springailab: DEBUG
