spring:
  application.name: spring-ai-lab

  # Rely on BatchAutoConfiguration for JobRepository, JobOperator, etc. Do not run the
  # ingestion job on startup (trigger via POST /run-ingestion only).
  batch:
    job:
      enabled: false

  ai:
    model:
      # Supported values include: ollama, openai, bedrock-converse
      chat: ${APP_CHAT_MODEL:ollama}
    retry.max-attempts: 5

    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3.1}
          max-tokens: 500 # Limits cost by capping response length

    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
          max-tokens: 500

    bedrock:
      aws:
        region: ${AWS_REGION:eu-central-1}
        access-key: ${AWS_ACCESS_KEY:}
        secret-key: ${AWS_SECRET_KEY:}
      converse:
        chat:
          options:
            model: "${BEDROCK_MODEL_ID:anthropic.claude-3-5-sonnet-20240620-v1:0}"
            max-tokens: 500

  reactor.context-propagation: auto

# Appended to the system prompt by PersonaAdvisor (see ChatClientConfig.defaultAdvisors).
app.chat:
  memory-retrieve-size: 100
  creative-temperature: 0.9
  strict-temperature: 0.1
  persona: "Be concise and friendly."

# Local OpenSearch (single-node dev). JVM does not embed OpenSearch; point at loopback.
# Example: docker run -p 9200:9200 -e discovery.type=single-node -e DISABLE_SECURITY_PLUGIN=true \
#   opensearchproject/opensearch:2.11.0
app.opensearch:
  host: ${OPENSEARCH_HOST:127.0.0.1}
  port: ${OPENSEARCH_PORT:9200}
  scheme: ${OPENSEARCH_SCHEME:http}
  index-name: ${OPENSEARCH_INDEX:hybrid-documents}

# Demo reranking key (override in env for real usage).
rerank.api.key: ${RERANK_API_KEY:demo-free-rerank-key}

logging:
  level:
    com.example.springailab: DEBUG
