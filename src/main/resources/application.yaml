spring:
  application.name: spring-ai-lab

  # Rely on BatchAutoConfiguration for JobRepository, JobOperator, etc. Do not run the
  # ingestion job on startup (trigger via POST /run-ingestion only).
  batch:
    job:
      enabled: false

  ai:
    model:
      # Supported values include: ollama, openai, bedrock-converse
      chat: ${APP_CHAT_MODEL:ollama}
      # Provider for embeddings (ollama with dev-ollama Maven profile). Distinct from OLLAMA_EMBEDDING_MODEL (Ollama model name).
      embedding: ${APP_EMBEDDING_PROVIDER:ollama}
    retry.max-attempts: 5
    # Capture prompts/completions on chat-model observations so Langfuse traces show inputs/outputs.
    # Disabled by default in Spring AI because prompts can carry PII; safe to keep on for this demo.
    chat.observations:
      log-prompt: true
      log-completion: true

    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          # Default fits ~4 GiB RAM; override with OLLAMA_MODEL (e.g. llama3.1) when you have more memory.
          model: ${OLLAMA_MODEL:llama3.2:1b}
          max-tokens: 500 # Limits cost by capping response length
      embedding:
        options:
          # Pull with: ollama pull nomic-embed-text (see ./start-demo.sh / docker-compose.yml)
          model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
          max-tokens: 500
          stream: false

    bedrock:
      aws:
        region: ${AWS_REGION:eu-central-1}
        access-key: ${AWS_ACCESS_KEY:}
        secret-key: ${AWS_SECRET_KEY:}
      converse:
        chat:
          options:
            model: "${BEDROCK_MODEL_ID:anthropic.claude-3-5-sonnet-20240620-v1:0}"
            max-tokens: 500

  reactor.context-propagation: auto

# Appended to the system prompt by PersonaAdvisor (see ChatClientConfig.defaultAdvisors).
app.chat:
  memory-retrieve-size: 100
  creative-temperature: 0.9
  strict-temperature: 0.1
  persona: "Be concise and friendly."

# Local OpenSearch (single-node dev). JVM does not embed OpenSearch; point at loopback.
# Example: docker run -p 9200:9200 -e discovery.type=single-node -e DISABLE_SECURITY_PLUGIN=true \
#   opensearchproject/opensearch:2.11.0
app.opensearch:
  host: ${OPENSEARCH_HOST:127.0.0.1}
  port: ${OPENSEARCH_PORT:9200}
  scheme: ${OPENSEARCH_SCHEME:http}
  index-name: ${OPENSEARCH_INDEX:hybrid-documents}

# Demo reranking key (override in env for real usage).
rerank.api.key: ${RERANK_API_KEY:demo-free-rerank-key}

# Send Spring AI observations to the Langfuse stack defined in docker-compose.yml.
# Auth header is base64("pk-lf-spring-ai-lab:sk-lf-spring-ai-lab") — matches LANGFUSE_INIT_PROJECT_*.
# Override LANGFUSE_OTLP_ENDPOINT to point elsewhere; set LANGFUSE_TRACE_SAMPLING=0 to disable tracing.
management:
  tracing:
    sampling:
      probability: ${LANGFUSE_TRACE_SAMPLING:1.0}
  otlp:
    tracing:
      endpoint: ${LANGFUSE_OTLP_ENDPOINT:http://localhost:3000/api/public/otel/v1/traces}
      headers:
        Authorization: Basic ${LANGFUSE_OTLP_AUTH:cGstbGYtc3ByaW5nLWFpLWxhYjpzay1sZi1zcHJpbmctYWktbGFi}

logging:
  level:
    com.example.springailab: DEBUG
    # TEMP: verbose tracing while wiring Langfuse. Revert to ERROR once traces flow.
    io:
      opentelemetry: DEBUG
      micrometer.tracing: DEBUG
    org.springframework.boot.actuate.autoconfigure:
      tracing: DEBUG
      observation: DEBUG
