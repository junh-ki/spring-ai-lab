# Local stack for ./start-demo.sh: Redis (embedding cache) + Ollama (chat + embeddings).
# Langfuse runs in a separate compose project — see langfuse/docker-compose.yml.
# Override ports: REDIS_HOST_PORT=6380 OLLAMA_HOST_PORT=11435 docker compose up -d
name: spring-ai-lab

services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 3s
    mem_limit: 128m

  ollama:
    image: ollama/ollama:latest
    pull_policy: never
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 15s

volumes:
  ollama_data:
