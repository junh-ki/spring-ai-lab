name: deepeval-blackbox

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: deepeval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  blackbox-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      OLLAMA_HOST: 127.0.0.1:11434
      OLLAMA_MODELS: /home/runner/.ollama/models
      OLLAMA_BASE_URL: http://127.0.0.1:11434
      OLLAMA_MODEL: llama3.2:1b
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      SPRING_DATA_REDIS_HOST: 127.0.0.1
      SPRING_DATA_REDIS_PORT: '6379'
      SPRING_BASE_URL: http://localhost:8080
      SPRING_USER: user
      SPRING_PASSWORD: demo
      DEEPEVAL_TELEMETRY_OPT_OUT: 'YES'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: deepeval/requirements.txt

      - name: Cache Ollama models
        uses: actions/cache@v4
        with:
          path: /home/runner/.ollama/models
          key: ollama-models-${{ env.OLLAMA_MODEL }}-${{ env.OLLAMA_EMBEDDING_MODEL }}-v1

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama and pull models
        run: |
          mkdir -p "$OLLAMA_MODELS"
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          echo $! > /tmp/ollama.pid
          for _ in $(seq 1 60); do
            curl -sf "$OLLAMA_BASE_URL/api/tags" >/dev/null && break
            sleep 2
          done
          curl -sf "$OLLAMA_BASE_URL/api/tags" >/dev/null \
            || { echo "ollama did not start"; cat /tmp/ollama.log; exit 1; }
          # Idempotent: re-uses cached blobs in $OLLAMA_MODELS when restored from actions/cache.
          ollama pull "$OLLAMA_MODEL"
          ollama pull "$OLLAMA_EMBEDDING_MODEL"

      - name: Install Python deps
        working-directory: deepeval
        run: |
          python -m pip install -q --upgrade pip
          pip install -q -r requirements.txt

      - name: Start Spring Boot (dev profile, dev-ollama Maven profile)
        run: |
          nohup ./mvnw -q -Pdev-ollama spring-boot:run \
            -Dspring-boot.run.profiles=dev \
            > /tmp/spring.log 2>&1 &
          echo $! > /tmp/spring.pid

      - name: Wait for Spring readiness
        run: |
          for _ in $(seq 1 120); do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              -u "$SPRING_USER:$SPRING_PASSWORD" \
              "$SPRING_BASE_URL/actuator/health" || true)
            if [ "$code" = "200" ]; then
              echo "spring ready"
              exit 0
            fi
            sleep 3
          done
          echo "spring did not become ready"
          tail -300 /tmp/spring.log || true
          exit 1

      - name: Run deepeval blackbox suite
        working-directory: deepeval
        run: pytest

      - name: Dump logs on failure
        if: failure()
        run: |
          echo '--- spring log (tail) ---'
          tail -500 /tmp/spring.log || true
          echo '--- ollama log (tail) ---'
          tail -200 /tmp/ollama.log || true

      - name: Stop background processes
        if: always()
        run: |
          [ -f /tmp/spring.pid ] && kill "$(cat /tmp/spring.pid)" 2>/dev/null || true
          pkill -f 'com.example.springailab.SpringAiLabApplication' 2>/dev/null || true
          [ -f /tmp/ollama.pid ] && kill "$(cat /tmp/ollama.pid)" 2>/dev/null || true
