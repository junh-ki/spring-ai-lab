name: blackbox-tests

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: blackbox-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  blackbox-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      OLLAMA_HOST: 127.0.0.1:11434
      OLLAMA_MODELS: /home/runner/.ollama/models
      OLLAMA_BASE_URL: http://127.0.0.1:11434
      OLLAMA_MODEL: llama3.2:1b
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      SPRING_DATA_REDIS_HOST: 127.0.0.1
      SPRING_DATA_REDIS_PORT: '6379'
      SPRING_BASE_URL: http://localhost:8080
      SPRING_USER: user
      SPRING_PASSWORD: demo
      DEEPEVAL_TELEMETRY_OPT_OUT: 'YES'
      # No Langfuse in CI: sampling=0 makes OTel's sampler alwaysOff, so the
      # OTLP exporter never tries to reach a non-existent :3000 endpoint.
      LANGFUSE_TRACE_SAMPLING: '0'

    steps:
      # ========================================================================
      # 1. Setup — provision toolchains, restore caches, bring app stack online.
      # ========================================================================
      - name: 'Setup — checkout'
        uses: actions/checkout@v4

      - name: 'Setup — JDK 21'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: 'Setup — Python 3.12'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: deepeval/requirements.txt

      - name: 'Setup — restore Ollama model cache'
        uses: actions/cache@v4
        with:
          path: /home/runner/.ollama/models
          key: ollama-models-${{ env.OLLAMA_MODEL }}-${{ env.OLLAMA_EMBEDDING_MODEL }}-v1

      - name: 'Setup — Ollama (install, serve, pull models)'
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          mkdir -p "$OLLAMA_MODELS"
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          echo $! > /tmp/ollama.pid
          for _ in $(seq 1 60); do
            curl -sf "$OLLAMA_BASE_URL/api/tags" >/dev/null && break
            sleep 2
          done
          curl -sf "$OLLAMA_BASE_URL/api/tags" >/dev/null \
            || { echo "ollama did not start"; cat /tmp/ollama.log; exit 1; }
          # Idempotent: re-uses cached blobs when the cache step restored them.
          ollama pull "$OLLAMA_MODEL"
          ollama pull "$OLLAMA_EMBEDDING_MODEL"

      - name: 'Setup — Python test deps'
        working-directory: deepeval
        run: |
          python -m pip install -q --upgrade pip
          pip install -q -r requirements.txt

      - name: 'Setup — Spring Boot (start in background, wait for readiness)'
        run: |
          nohup ./mvnw -q -Pdev-ollama spring-boot:run \
            -Dspring-boot.run.profiles=dev \
            > /tmp/spring.log 2>&1 &
          echo $! > /tmp/spring.pid
          for _ in $(seq 1 120); do
            code=$(curl -s -o /dev/null -w '%{http_code}' \
              -u "$SPRING_USER:$SPRING_PASSWORD" \
              "$SPRING_BASE_URL/actuator/health" || true)
            if [ "$code" = "200" ]; then
              echo "spring ready"
              exit 0
            fi
            sleep 3
          done
          echo "spring did not become ready"
          tail -300 /tmp/spring.log || true
          exit 1

      # ========================================================================
      # 2. Test — run blackbox suites against the running app. Add new tools
      #    (garak, promptfoo, etc.) as additional 'Test — <tool>' steps below.
      # ========================================================================
      - name: 'Test — deepeval'
        working-directory: deepeval
        run: pytest

      # ========================================================================
      # 3. Cleanup — dump diagnostic logs on failure, then stop background procs.
      # ========================================================================
      - name: 'Cleanup — dump logs on failure'
        if: failure()
        run: |
          echo '--- spring log (tail) ---'
          tail -500 /tmp/spring.log || true
          echo '--- ollama log (tail) ---'
          tail -200 /tmp/ollama.log || true

      - name: 'Cleanup — stop background processes'
        if: always()
        run: |
          [ -f /tmp/spring.pid ] && kill "$(cat /tmp/spring.pid)" 2>/dev/null || true
          pkill -f 'com.example.springailab.SpringAiLabApplication' 2>/dev/null || true
          [ -f /tmp/ollama.pid ] && kill "$(cat /tmp/ollama.pid)" 2>/dev/null || true
